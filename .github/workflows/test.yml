name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test
      # El build valida los esquemas Zod del contenido y las plantillas .astro
      # (la capa que TESTING.md documenta como parte de la red de seguridad).
      - run: npm run build

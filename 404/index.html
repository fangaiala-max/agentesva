<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Página no encontrada | AgentesVA</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Manrope:wght@400;600&display=optional" rel="stylesheet">
    <style>
        @property --hue            { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --rotate         { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --bg-y           { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --bg-x           { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --glow-translate-y { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --bg-size        { syntax: "<number>"; inherits: true; initial-value: 1; }
        @property --glow-opacity   { syntax: "<number>"; inherits: true; initial-value: 1; }
        @property --glow-blur      { syntax: "<number>"; inherits: true; initial-value: 6; }
        @property --glow-scale     { syntax: "<number>"; inherits: true; initial-value: 1.5; }
        @property --glow-radius    { syntax: "<number>"; inherits: true; initial-value: 100; }
        @property --white-shadow   { syntax: "<number>"; inherits: true; initial-value: 0; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #FAFAF7;
            color: white;
            font-family: 'Manrope', -apple-system, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 5rem 1rem 3rem;
            gap: 2.5rem;
        }

        .page-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }

        /* ── Nav ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(250,250,247,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(45,106,79,0.1);
            z-index: 100;
        }
        .brand { color: white; text-decoration: none; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em; }
        .brand span { color: #2D6A4F; }
        .nav-btn { display: inline-flex; align-items: center; padding: 0.45rem 1.1rem; background: #2D6A4F; color: #0a1a0e; border-radius: 100px; font-weight: 700; text-decoration: none; font-size: 0.8rem; transition: transform 0.2s; }
        .nav-btn:hover { transform: scale(1.04); }

        /* ── GlowingShadow ── */
        .glow-container {
            --card-color: hsl(130deg 20% 5%);
            --card-radius: 24px;
            --card-width: min(480px, 92vw);
            --border-width: 3px;
            --hue-speed: 1;
            --rotate: 0;
            --animation-speed: 4s;
            --interaction-speed: 0.55s;
            --scale-factor: 1;
            --glow-rotate-unit: 1deg;

            width: var(--card-width);
            aspect-ratio: 1.5 / 1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            border-radius: var(--card-radius);
        }
        .glow-container::before,
        .glow-container::after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: var(--card-radius);
        }
        .glow-content {
            position: absolute;
            inset: 0;
            background: var(--card-color);
            border-radius: calc(var(--card-radius) * 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.85rem;
            padding: 2rem;
            text-align: center;
            overflow: hidden;
        }
        .glow-content::before {
            content: "";
            display: block;
            position: absolute;
            width: calc(100% + var(--border-width));
            height: calc(100% + var(--border-width));
            top: calc(var(--border-width) / -2);
            left: calc(var(--border-width) / -2);
            border-radius: calc(var(--card-radius) * 0.9);
            box-shadow: 0 0 20px black;
            mix-blend-mode: color-burn;
            z-index: -1;
            background: hsl(0deg 0% 16%) radial-gradient(
                30% 30% at calc(var(--bg-x) * 1%) calc(var(--bg-y) * 1%),
                hsl(calc(var(--hue) * var(--hue-speed) * 1deg) 100% 90%) calc(0% * var(--bg-size)),
                hsl(calc(var(--hue) * var(--hue-speed) * 1deg) 100% 80%) calc(20% * var(--bg-size)),
                hsl(calc(var(--hue) * var(--hue-speed) * 1deg) 100% 60%) calc(40% * var(--bg-size)),
                transparent 100%
            );
            animation: hue-animation var(--animation-speed) linear infinite,
                       rotate-bg var(--animation-speed) linear infinite;
            transition: --bg-size var(--interaction-speed) ease;
        }
        .glow {
            --glow-translate-y: 0;
            display: block;
            position: absolute;
            width: calc(var(--card-width) / 5);
            height: calc(var(--card-width) / 5);
            animation: glow-rotate var(--animation-speed) linear infinite;
            transform: rotateZ(calc(var(--rotate) * var(--glow-rotate-unit)));
            transform-origin: center;
            border-radius: calc(var(--glow-radius) * 10vw);
            pointer-events: none;
        }
        .glow::after {
            content: "";
            display: block;
            z-index: -2;
            filter: blur(calc(var(--glow-blur) * 10px));
            width: 130%;
            height: 130%;
            left: -15%;
            top: -15%;
            background: hsl(calc(var(--hue) * var(--hue-speed) * 1deg) 100% 60%);
            position: relative;
            border-radius: calc(var(--glow-radius) * 10vw);
            animation: hue-animation var(--animation-speed) linear infinite;
            transform: scaleY(calc(var(--glow-scale) * var(--scale-factor) / 1.1))
                       scaleX(calc(var(--glow-scale) * var(--scale-factor) * 1.2))
                       translateY(calc(var(--glow-translate-y) * 1%));
            opacity: var(--glow-opacity);
        }
        .glow-container:hover .glow-content {
            mix-blend-mode: darken;
            box-shadow: 0 0 calc(var(--white-shadow) * 1vw) calc(var(--white-shadow) * 0.15vw) rgb(255 255 255 / 20%);
            animation: shadow-pulse calc(var(--animation-speed) * 2) linear infinite;
        }
        .glow-container:hover .glow-content::before { --bg-size: 15; animation-play-state: paused; }
        .glow-container:hover .glow {
            --glow-blur: 1.5; --glow-opacity: 0.6; --glow-scale: 2.5;
            --glow-radius: 0; --rotate: 900; --glow-rotate-unit: 0; --scale-factor: 1.25;
            animation-play-state: paused;
        }
        .glow-container:hover .glow::after { animation-play-state: paused; }

        @keyframes shadow-pulse {
            0%,24%,46%,73%,96%       { --white-shadow: 0.5; }
            12%,28%,41%,63%,75%,82%,98% { --white-shadow: 2.5; }
            6%,32%,57%               { --white-shadow: 1.3; }
            18%,52%,88%              { --white-shadow: 3.5; }
        }
        @keyframes rotate-bg {
            0%   { --bg-x: 0;   --bg-y: 0;   }
            25%  { --bg-x: 100; --bg-y: 0;   }
            50%  { --bg-x: 100; --bg-y: 100; }
            75%  { --bg-x: 0;   --bg-y: 100; }
            100% { --bg-x: 0;   --bg-y: 0;   }
        }
        @keyframes glow-rotate {
            from { --rotate: -70;  --glow-translate-y: -65; }
            25%  { --glow-translate-y: -65; }
            50%  { --glow-translate-y: -65; }
            75%  { --glow-translate-y: -65; }
            to   { --rotate: 290;  --glow-translate-y: -65; }
        }
        @keyframes hue-animation {
            0%   { --hue: 0; }
            100% { --hue: 360; }
        }
        @media (prefers-reduced-motion: reduce) {
            .glow-content::before, .glow, .glow::after { animation: none; }
        }

        /* ── 404 content ── */
        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(4.5rem, 14vw, 7.5rem);
            font-weight: 900;
            line-height: 1;
            color: #2D6A4F;
            letter-spacing: -0.04em;
        }
        .error-msg {
            font-size: 1rem;
            color: rgba(255,255,255,0.65);
            line-height: 1.5;
        }
        .error-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.6rem;
            background: #2D6A4F;
            color: #0a1a0e;
            border-radius: 100px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.88rem;
            margin-top: 0.25rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .error-back:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,106,79,0.3); }

        /* ── Quick links ── */
        .quick-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .quick-links a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.82rem;
            transition: color 0.2s;
        }
        .quick-links a:hover { color: #2D6A4F; }
        .quick-links span { color: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">Agentes<span>VA</span></a>
        <a href="/catalogo/" class="nav-btn">Ver agentes IA →</a>
    </nav>

    <div class="page-wrap">
        <div class="glow-container">
            <span class="glow"></span>
            <div class="glow-content">
                <div class="error-code">404</div>
                <p class="error-msg">Esta página no existe o fue movida</p>
                <a href="/" class="error-back">Volver al inicio →</a>
            </div>
        </div>

        <nav class="quick-links" aria-label="Páginas principales">
            <a href="/catalogo/">Catálogo de Agentes IA</a>
            <span aria-hidden="true">·</span>
            <a href="/precios/">Precios y Setup</a>
            <span aria-hidden="true">·</span>
            <a href="/servicios/">Servicios Premium</a>
            <span aria-hidden="true">·</span>
            <a href="/faq/">Preguntas Frecuentes</a>
        </nav>
    </div>
</body>
</html>

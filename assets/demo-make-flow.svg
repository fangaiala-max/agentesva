<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#b0aba5"/>
    </marker>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#d5d0ca"/>
    </pattern>
    <clipPath id="clip">
      <rect width="600" height="260" rx="10"/>
    </clipPath>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Canvas base -->
    <rect width="600" height="260" fill="#f2f0ed"/>

    <!-- Browser chrome -->
    <rect width="600" height="36" fill="#1e1e1e"/>
    <!-- Traffic lights -->
    <circle cx="18" cy="18" r="5.5" fill="#ff5f57"/>
    <circle cx="36" cy="18" r="5.5" fill="#febc2e"/>
    <circle cx="54" cy="18" r="5.5" fill="#28c840"/>
    <!-- URL bar -->
    <rect x="150" y="9" width="300" height="18" rx="4" fill="#333"/>
    <text x="300" y="21.5" fill="#aaa" font-size="10" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" text-anchor="middle">make.com — Escenario activo</text>

    <!-- App toolbar -->
    <rect y="36" width="600" height="31" fill="#ffffff"/>
    <rect y="66" width="600" height="1" fill="#e3dfd9"/>
    <!-- Scenario title -->
    <text x="16" y="56.5" fill="#111" font-size="12" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">AgentesVA</text>
    <!-- ON status pill -->
    <rect x="492" y="43" width="92" height="20" rx="10" fill="#dcfce7"/>
    <circle cx="506" cy="53" r="4" fill="#16a34a"/>
    <text x="517" y="57" fill="#15803d" font-size="10.5" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">ON · Activo</text>

    <!-- Canvas with dot grid -->
    <rect y="67" width="600" height="193" fill="#f2f0ed"/>
    <rect y="67" width="600" height="193" fill="url(#dots)"/>

    <!-- ── MODULE 1: WEBHOOK ── -->
    <circle cx="121" cy="154" r="43" fill="rgba(0,0,0,0.07)"/>
    <circle cx="120" cy="152" r="43" fill="#ff7849" filter="url(#shadow)"/>
    <text x="120" y="160" fill="white" font-size="26" text-anchor="middle" font-family="sans-serif">⚡</text>
    <text x="120" y="211" fill="#333" font-size="11" font-weight="600" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Webhook</text>
    <text x="120" y="224" fill="#888" font-size="9.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Disparador</text>
    <!-- Run count badge -->
    <rect x="148" y="116" width="32" height="15" rx="7" fill="#111"/>
    <text x="164" y="127" fill="white" font-size="9" text-anchor="middle" font-weight="700" font-family="sans-serif">847×</text>

    <!-- Arrow 1 -->
    <path d="M 165 152 L 245 152" stroke="#c0bbb5" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

    <!-- ── MODULE 2: OPENAI ── -->
    <circle cx="301" cy="154" r="43" fill="rgba(0,0,0,0.07)"/>
    <circle cx="300" cy="152" r="43" fill="#1a1a1a" filter="url(#shadow)"/>
    <text x="300" y="160" fill="white" font-size="26" text-anchor="middle" font-family="sans-serif">🤖</text>
    <text x="300" y="211" fill="#333" font-size="11" font-weight="600" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">OpenAI</text>
    <text x="300" y="224" fill="#888" font-size="9.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">GPT-4o</text>
    <!-- Model badge -->
    <rect x="328" y="116" width="44" height="15" rx="7" fill="#6d28d9"/>
    <text x="350" y="127" fill="white" font-size="8.5" text-anchor="middle" font-weight="700" font-family="sans-serif">GPT-4o</text>

    <!-- Processing time pill (between arrow 1 and 2) -->
    <rect x="214" y="162" width="112" height="18" rx="9" fill="rgba(255,255,255,0.92)"/>
    <rect x="214" y="162" width="112" height="18" rx="9" fill="none" stroke="#ddd" stroke-width="1"/>
    <text x="270" y="174.5" fill="#555" font-size="9.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">⚡ avg. 2.3 seg</text>

    <!-- Arrow 2 -->
    <path d="M 345 152 L 425 152" stroke="#c0bbb5" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

    <!-- ── MODULE 3: GMAIL ── -->
    <circle cx="481" cy="154" r="43" fill="rgba(0,0,0,0.07)"/>
    <circle cx="480" cy="152" r="43" fill="#ea4335" filter="url(#shadow)"/>
    <text x="480" y="160" fill="white" font-size="26" text-anchor="middle" font-family="sans-serif">✉️</text>
    <text x="480" y="211" fill="#333" font-size="11" font-weight="600" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Gmail</text>
    <text x="480" y="224" fill="#888" font-size="9.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Respuesta automática</text>
    <!-- Success badge -->
    <rect x="508" y="116" width="36" height="15" rx="7" fill="#16a34a"/>
    <text x="526" y="127" fill="white" font-size="9" text-anchor="middle" font-weight="700" font-family="sans-serif">✓ OK</text>

    <!-- Make.com watermark -->
    <text x="590" y="253" fill="#c8c3bd" font-size="9" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Make.com</text>

  </g>

  <!-- Outer border -->
  <rect width="600" height="260" rx="10" fill="none" stroke="#d5d0ca" stroke-width="1"/>
</svg>

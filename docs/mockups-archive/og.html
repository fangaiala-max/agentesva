<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800&family=Geist+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;background:#0B1020;color:#fff;font-family:"Geist",system-ui,sans-serif;padding:70px 76px;position:relative}
  body::after{content:"";position:absolute;inset:0;background:radial-gradient(800px 380px at 78% -8%, rgba(224,72,58,.16), transparent 70%)}
  .logo{display:flex;align-items:center;gap:13px;font-weight:800;font-size:34px;letter-spacing:-.03em}
  .logo .mk{width:42px;height:42px;border-radius:11px;background:#34D87E;display:grid;place-items:center;color:#06250F;font-size:24px}
  .logo .va{color:#34D87E}
  .pill{display:inline-flex;align-items:center;gap:9px;border:1px solid #2c3957;border-radius:999px;padding:8px 16px;font-size:17px;color:#C4CAD6;margin-top:54px;font-family:"Geist Mono",monospace}
  .pill .d{width:9px;height:9px;border-radius:50%;background:#E0483A}
  h1{font-size:62px;line-height:1.06;letter-spacing:-.03em;font-weight:800;margin-top:24px;max-width:15.5em}
  h1 em{font-style:normal;color:#FBE4E1}
  .sub{font-size:24px;color:#AEB6C4;margin-top:22px;max-width:30em}
  .foot{position:absolute;left:76px;bottom:60px;display:flex;gap:26px;align-items:center;font-family:"Geist Mono",monospace;font-size:18px;color:#8b93a3}
  .foot b{color:#34D87E}
</style></head>
<body>
  <div class="logo"><span class="mk">A</span>Agentes<span class="va">VA</span></div>
  <div class="pill"><span class="d"></span> Reputación de marca en IA · ES · EN · RU</div>
  <h1>Gestiona lo que la IA <em>dice de tu marca</em>.</h1>
  <div class="sub">Descubre gratis qué dato falso repite ChatGPT sobre ti, con la prueba.</div>
  <div class="foot"><span><b>agentesva.com</b></span><span>Escaneo gratis · 90 s</span></div>
</body></html>
